name: fragpipe_headless
description: Run FragPipe in headless mode (all-in-one process) for database search, validation, quantification, and reporting.
keywords:
  - FragPipe
  - proteomics
  - database search
  - MSFragger
  - quantification
tools:
  - fragpipe:
      description: |
        FragPipe is an integrated proteomics pipeline that orchestrates MSFragger,
        Philosopher, MSBooster, IonQuant, and other tools for comprehensive analysis.
        This module runs FragPipe in headless mode, producing results identical to the GUI.
      homepage: https://fragpipe.nesvilab.org/
      documentation: https://fragpipe.nesvilab.org/docs/tutorial_fragpipe.html
input:
  - raw_files:
      type: file
      description: All raw data files (.d, .raw, .mzML) staged into raw_files/ subdirectory
      pattern: "raw_files/*"
  - database:
      type: file
      description: FASTA database file for protein identification
      pattern: "*.fasta"
  - workflow_file:
      type: file
      description: FragPipe .workflow configuration file defining all tool parameters
      pattern: "*.workflow"
  - manifest_content:
      type: value
      description: Tab-separated manifest content (filename, experiment, bioreplicate, data_type)
output:
  - all_results:
      type: file
      description: All FragPipe output files
      pattern: "results/**"
  - combined_protein:
      type: file
      description: Combined protein report across all experiments
      pattern: "results/combined_protein.tsv"
  - combined_peptide:
      type: file
      description: Combined peptide report across all experiments
      pattern: "results/combined_peptide.tsv"
  - combined_ion:
      type: file
      description: Combined ion report across all experiments
      pattern: "results/combined_ion.tsv"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@dongzehe"
