name: "msfragger_index"
description: Prebuild MSFragger pepindex files from FASTA and params (digest-only mode)
keywords:
  - proteomics
  - mass spectrometry
  - peptide indexing
  - database digest
  - msfragger
  - pepindex
tools:
  - msfragger:
      description: |
        MSFragger is an ultrafast database search tool for peptide identification
        in mass spectrometry-based proteomics. In digest-only mode (no spectra files),
        it creates pepindex files that cache the in-silico digest of a FASTA database.
        These pepindex files can be reused across multiple search tasks to avoid
        redundant digest computation.
      homepage: "https://msfragger.nesvilab.org/"
      documentation: "https://github.com/Nesvilab/MSFragger/wiki"
      tool_dev_url: "https://github.com/Nesvilab/MSFragger"
      doi: "10.1038/nmeth.4256"
      licence: ["Commercial"]
      note: "License pre-installed in container"

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample/experiment information.
          e.g. `[ id: 'experiment1' ]`
    - fasta:
        type: file
        description: Protein sequence database in FASTA format
        pattern: "*.{fasta,fas,fa}"
  - - params_file:
        type: file
        description: |
          MSFragger params file (native fragger.params format).
          The module overrides database_name, num_threads, and calibrate_mass
          at runtime. Pepindex depends on digest parameters only: enzyme,
          missed cleavages, peptide length/mass range, and variable modifications.
        pattern: "*.params"

output:
  indexed_fasta:
    - - meta:
          type: map
          description: Groovy Map containing sample/experiment information
      - fasta:
          type: file
          description: Original FASTA file (must be co-located with pepindex for MSFragger reuse)
          pattern: "*.{fasta,fas,fa}"
      - "*.pepindex":
          type: file
          description: |
            Prebuilt pepindex file(s) containing cached in-silico digest.
            MSFragger automatically detects and reuses these when co-located
            with the FASTA and digest parameters match.
          pattern: "*.pepindex"
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@dongzehe"
maintainers:
  - "@dongzehe"
