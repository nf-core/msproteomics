name: "philosopher_pipeline"
description: Run Philosopher filter and report pipeline for proteomics analysis
keywords:
  - proteomics
  - FDR
  - filter
  - report
  - PSM
  - peptide
  - protein
  - pipeline
tools:
  - philosopher:
      description: |
        Philosopher pipeline module runs the complete filter and report workflow
        including workspace initialization, database annotation, FDR filtering,
        and result reporting. Similar to PHILOSOPHER_FILTER but includes mzML files
        for additional processing.
      homepage: "https://philosopher.nesvilab.org/"
      documentation: "https://github.com/Nesvilab/philosopher/wiki"
      tool_dev_url: "https://github.com/Nesvilab/philosopher"
      doi: "10.1038/s41592-020-0912-y"
      licence: ["GPL-3.0"]

input:
  - - meta:
        type: map
        description: Groovy Map containing sample information
    - pepxml_files:
        type: file
        description: PepXML files from Percolator or search engine
        pattern: "*.pep.xml"
    - protxml:
        type: file
        description: ProtXML file from ProteinProphet
        pattern: "*.prot.xml"
    - mzml_files:
        type: file
        description: mzML spectral files
        pattern: "*.mzML"
    - fasta:
        type: file
        description: FASTA database with decoys from PHILOSOPHER_DATABASE
        pattern: "*.fasta"
    - filter_flags:
        type: string
        description: CLI flags for philosopher filter (e.g., "--sequential --razor --prot 0.01 --picked")
    - report_flags:
        type: string
        description: CLI flags for philosopher report (e.g., "--msstats")

output:
  results_dir:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "${prefix}":
          type: directory
          description: Directory containing all output files
  proteins:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "${prefix}/protein.tsv":
          type: file
          description: Protein-level results
          pattern: "protein.tsv"
  peptides:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "${prefix}/peptide.tsv":
          type: file
          description: Peptide-level results
          pattern: "peptide.tsv"
  psms:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "${prefix}/psm.tsv":
          type: file
          description: PSM-level results
          pattern: "psm.tsv"
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@dongzehe"
maintainers:
  - "@dongzehe"
