name: "proteinprophet"
description: Statistical protein inference using ProteinProphet
keywords:
  - proteomics
  - mass spectrometry
  - protein inference
  - probability
tools:
  - proteinprophet:
      description: |
        ProteinProphet is a statistical model for protein inference from
        peptide identifications. It handles shared peptides and computes
        protein-level probabilities considering peptide degeneracy.
      homepage: "https://proteinprophet.sourceforge.net/"
      documentation: "http://tools.proteomecenter.org/wiki/index.php?title=Software:ProteinProphet"
      doi: "10.1021/ac0341261"
      licence: ["GPL-2.0"]

input:
  - - meta:
        type: map
        description: Groovy Map containing sample information
    - pepxml_files:
        type: file
        description: PepXML files from Percolator or PeptideProphet
        pattern: "*.pep.xml"
    - config_cli:
        type: string
        description: |
          ProteinProphet CLI options as a string (e.g., "--maxppmdiff 2000000").
          Passed from PARSE_FRAGPIPE_WORKFLOW tool_configs.

output:
  results_dir:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "${prefix}":
          type: directory
          description: Directory containing ProteinProphet results and logs
  protxml:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "${prefix}/combined.prot.xml":
          type: file
          description: ProtXML with protein inference results
          pattern: "combined.prot.xml"
  pepxml:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - pepxml_files:
          type: file
          description: |
            Pass-through of input pepXML files. Used to synchronize downstream
            processes that need both pepxml and protxml to be ready.
          pattern: "*.pep.xml"
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@dongzehe"
maintainers:
  - "@dongzehe"
