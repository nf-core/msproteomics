name: preprocess_expdesign
description: Preprocess experimental design files for OpenMS compatibility
keywords:
  - experimental design
  - preprocessing
  - openms
tools:
  - preprocess_expdesign:
      description: |
        Converts experimental design file endings from .raw to .mzML
        and extracts configuration information for downstream OpenMS tools.
      homepage: https://github.com/bigbio/quantms
input:
  - design:
      type: file
      description: Experimental design file
      pattern: "*.{tsv,txt}"
output:
  - ch_expdesign:
      type: file
      description: Preprocessed experimental design file for OpenMS
      pattern: "*_openms_design.tsv"
  - ch_config:
      type: file
      description: Configuration file extracted from experimental design
      pattern: "*_config.tsv"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@nf-core"
  - "@bigbio"
