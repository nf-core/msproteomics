name: samplesheet_check
description: Validate and check samplesheet/experimental design files
keywords:
  - validation
  - samplesheet
  - experimental design
  - sdrf
tools:
  - samplesheet_check:
      description: |
        Validates samplesheet or experimental design files using quantms-utils.
      homepage: https://github.com/bigbio/quantms
input:
  - input_file:
      type: file
      description: Input samplesheet or experimental design file
      pattern: "*.{tsv,txt,csv}"
  - is_sdrf:
      type: boolean
      description: Whether the input file is in SDRF format
  - validate_ontologies:
      type: boolean
      description: Whether to validate ontologies
output:
  - log:
      type: file
      description: Log file from validation process
      pattern: "*.log"
  - checked_file:
      type: file
      description: Validated input file
      pattern: "*.{tsv,txt,csv}"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@nf-core"
  - "@bigbio"
