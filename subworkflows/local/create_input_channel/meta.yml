name: create_input_channel
description: Parse SDRF or experimental design files and create metadata-annotated input channels branched by acquisition method and labelling type.
keywords:
  - SDRF
  - input channel
  - metadata
components:
  - sdrf/parsing
  - preprocess_expdesign
input:
  - ch_sdrf_or_design:
      type: file
      description: SDRF or experimental design TSV file
  - is_sdrf:
      type: value
      description: Boolean flag indicating whether input is an SDRF file
output:
  - ch_meta_config_iso:
      type: channel
      description: "Channel of [meta, spectra_file] tuples for isobaric-labelled (TMT/iTRAQ) samples"
  - ch_meta_config_lfq:
      type: channel
      description: "Channel of [meta, spectra_file] tuples for label-free samples"
  - ch_meta_config_dia:
      type: channel
      description: "Channel of [meta, spectra_file] tuples for DIA samples"
  - ch_expdesign:
      type: file
      description: Experimental design file in OpenMS format
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@daichengxin"
