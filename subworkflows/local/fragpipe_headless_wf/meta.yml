# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "fragpipe_headless_wf"
description: All-in-one FragPipe headless execution with automatic RAW-to-mzML conversion and decoy database preparation
keywords:
  - proteomics
  - fragpipe
  - headless
  - dda
  - tmt
  - label-free
components:
  - thermorawfileparser
  - philosopher/database
  - fragpipe_headless
input:
  - ch_files:
      type: channel
      description: |
        Sample spectra files in RAW, mzML, or Bruker .d format.
        RAW files are automatically converted to mzML via ThermoRawFileParser.
        Structure: [ val(meta), path(spectra) ]
  - ch_database:
      type: channel
      description: |
        Protein FASTA database. Decoys are added automatically via Philosopher
        because FragPipe headless hard-fails if no decoy sequences are present.
        Structure: path(fasta)
  - ch_workflow_file:
      type: channel
      description: |
        FragPipe .workflow configuration file defining the analysis pipeline.
        Structure: path(workflow)
  - ch_manifest_content:
      type: channel
      description: |
        TSV-formatted manifest content mapping spectra files to experiments.
        Structure: val(manifest_string)
  - ch_annotation_content:
      type: channel
      description: |
        TMT annotation content (experiment, channel, sample_name columns).
        Pass empty string for LFQ workflows.
        Structure: val(annotation_string)
  - ch_file_experiment_map:
      type: channel
      description: |
        File-to-experiment mapping (filename, experiment columns).
        Pass empty string for LFQ workflows.
        Structure: val(map_string)
output:
  - all_results:
      type: directory
      description: |
        Complete FragPipe output directory containing all results.
        Structure: path(results/**)
  - combined_protein:
      type: file
      description: |
        Combined protein-level quantification across all samples.
        Structure: path(combined_protein.tsv)
  - combined_peptide:
      type: file
      description: |
        Combined peptide-level quantification across all samples.
        Structure: path(combined_peptide.tsv)
  - combined_ion:
      type: file
      description: |
        Combined ion-level quantification across all samples.
        Structure: path(combined_ion.tsv)
  - versions:
      type: file
      description: |
        File containing software versions for all tools used.
        Structure: [ path(versions.yml) ]
authors:
  - "@dongzehe"
maintainers:
  - "@dongzehe"
