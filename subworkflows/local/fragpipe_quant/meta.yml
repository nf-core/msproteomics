# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/subworkflows/yaml-schema.json
name: "fragpipe_quant"
description: Quantification module orchestration supporting IonQuant label-free quantification with MaxLFQ, TMTIntegrator for TMT isobaric labeling, and FreeQuant for simple label-free quantification
keywords:
  - proteomics
  - quantification
  - label-free
  - tmt
  - ionquant
  - tmtintegrator
  - freequant
  - maxlfq
components:
  - ionquant
  - tmtintegrator
  - freequant
  - philosopher/labelquant
  - philosopher/report
input:
  - ch_results_dir:
      type: channel
      description: |
        Per-sample results directories from PHILOSOPHER_FILTER.
        Structure: [ val(meta), path(results_dir) ]
  - ch_mzml:
      type: channel
      description: |
        Spectra files in mzML format for quantification.
        Structure: [ val(meta), path(mzml) ]
  - ch_annotation:
      type: channel
      description: |
        Annotation file for TMT/IsoQuant quantification. Pass [] when not used.
        Structure: path(annotation_file)
  - ch_fasta:
      type: channel
      description: |
        Protein database FASTA file for PHILOSOPHER_REPORT database annotation.
        Structure: path(fasta)
  - ch_tool_configs:
      type: channel
      description: |
        Parsed JSON tool configuration map controlling which quantification tools to run.
        Structure: val(tool_configs_map)
  - ch_tmtintegrator_config:
      type: channel
      description: |
        TMTIntegrator YAML configuration file. Pass [] when not used.
        Structure: path(tmt-integrator.yml)
  - aggregate_meta:
      type: value
      description: |
        Metadata map for aggregate outputs (e.g., [id: 'fragpipe']).
output:
  - combined_protein:
      type: channel
      description: |
        Combined protein quantification table from IonQuant.
        Structure: [ val(meta), path(combined_protein.tsv) ]
  - combined_peptide:
      type: channel
      description: |
        Combined peptide quantification table from IonQuant.
        Structure: [ val(meta), path(combined_peptide.tsv) ]
  - combined_ion:
      type: channel
      description: |
        Combined ion quantification table from IonQuant.
        Structure: [ val(meta), path(combined_ion.tsv) ]
  - combined_modified_peptide:
      type: channel
      description: |
        Combined modified peptide quantification table from IonQuant.
        Structure: [ val(meta), path(combined_modified_peptide.tsv) ]
  - tmt_abundance:
      type: channel
      description: |
        TMT abundance tables from TMTIntegrator.
        Structure: [ val(meta), path(abundance_*.tsv) ]
  - tmt_ratio:
      type: channel
      description: |
        TMT ratio tables from TMTIntegrator.
        Structure: [ val(meta), path(ratio_*.tsv) ]
  - ionquant_dir:
      type: channel
      description: |
        IonQuant results directory.
        Structure: [ val(meta), path(results_dir) ]
  - tmt_dir:
      type: channel
      description: |
        TMTIntegrator results directory.
        Structure: [ val(meta), path(tmt-report) ]
  - freequant_ions:
      type: channel
      description: |
        FreeQuant per-sample ion quantification tables.
        Structure: [ val(meta), path(ion.tsv) ]
  - labelquant_results_dir:
      type: channel
      description: |
        Per-sample results directories with TMT intensities in .meta/ workspace.
        Generated by PHILOSOPHER_LABELQUANT after extracting reporter ion intensities.
        Structure: [ val(meta), path(results_dir) ]
  - report_results_dir:
      type: channel
      description: |
        Per-sample results directories with TSVs containing correct intensities.
        Generated by PHILOSOPHER_REPORT after FreeQuant/Labelquant updates .meta/ binaries.
        Structure: [ val(meta), path(results_dir) ]
  - report_psms:
      type: channel
      description: |
        Per-sample PSM tables with correct intensities.
        Structure: [ val(meta), path(psm.tsv) ]
  - report_peptides:
      type: channel
      description: |
        Per-sample peptide tables with correct intensities.
        Structure: [ val(meta), path(peptide.tsv) ]
  - report_proteins:
      type: channel
      description: |
        Per-sample protein tables with correct intensities.
        Structure: [ val(meta), path(protein.tsv) ]
  - versions:
      type: file
      description: |
        File containing software versions.
        Structure: [ path(versions.yml) ]
authors:
  - "@dongzehe"
maintainers:
  - "@dongzehe"
